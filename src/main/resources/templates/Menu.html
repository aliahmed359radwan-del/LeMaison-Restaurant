<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Menu – La Maison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
    <style>
        :root { --gold: #c9a84c; --dark: #1a1a1a; --cream: #faf7f2; }
        body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--dark); }
        .top-bar {
            background: var(--dark);
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 1.4rem; }
        .brand em { color: var(--gold); font-style: italic; }
        .back-link { color: var(--gold); text-decoration: none; font-size: 0.85rem; letter-spacing: 0.1em; }
        .back-link:hover { color: #fff; }
        .page-header {
            text-align: center;
            padding: 60px 20px 30px;
        }
        .eyebrow {
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 12px;
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 400; }
        .gold-line { width: 50px; height: 2px; background: var(--gold); margin: 20px auto 0; }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 24px 60px;
        }
        .menu-card {
            border: 1px solid #e8e0d0;
            padding: 28px;
            position: relative;
            transition: box-shadow 0.25s;
        }
        .menu-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .item-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .item-desc { font-size: 0.88rem; color: #888; line-height: 1.5; margin-bottom: 18px; }
        .item-price {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.05em;
        }
        .price-label { font-size: 0.75rem; font-weight: 300; color: #aaa; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="brand">La <em>Maison</em></span>
        <a href="/" class="back-link">← Back to Home</a>
    </div>
    <div class="page-header">
        <p class="eyebrow">Curated Selection</p>
        <h1>Our Menu</h1>
        <div class="gold-line"></div>
    </div>
    <div class="menu-grid">
        <div th:each="item : ${items}" class="menu-card">
            <div class="item-name" th:text="${item.name}"></div>
            <div class="item-desc" th:text="${item.description}"></div>
            <div class="item-price">
                <span th:text="${#numbers.formatDecimal(item.price, 1, 2)}"></span>
                <span class="price-label"> EGP</span>
                <!-- s -->
            </div>
        </div>
    </div>
</body>
</html>
