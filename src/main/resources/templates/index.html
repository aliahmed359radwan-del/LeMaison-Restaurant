<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leMaison</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .card {
            background: white;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { color: #2c3e50; }
        p  { color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏠 leMaison</h1>
        <p th:text="${message}">Default message</p>
        <p>Spring Boot + Thymeleaf + JPA + MySQL</p>
    </div>
</body>
</html>
