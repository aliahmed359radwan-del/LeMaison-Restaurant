<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>La Maison – Fine Dining</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --gold: #c9a84c;
            --dark: #1a1a1a;
            --cream: #faf7f2;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Lato', sans-serif;
            background: var(--dark);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-image: radial-gradient(ellipse at 30% 20%, #2a2015 0%, #1a1a1a 60%);
        }
        .hero { padding: 60px 30px; }
        .logo-line {
            font-size: 0.85rem;
            letter-spacing: 0.45em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 18px;
            font-weight: 300;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 400;
            color: var(--cream);
            line-height: 1.05;
            margin-bottom: 10px;
        }
        h1 em {
            font-style: italic;
            color: var(--gold);
        }
        .tagline {
            font-size: 1rem;
            letter-spacing: 0.15em;
            color: #aaa;
            font-weight: 300;
            margin-bottom: 56px;
        }
        .divider {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 56px;
        }
        .nav-cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .nav-card {
            display: block;
            width: 190px;
            padding: 32px 20px;
            border: 1px solid rgba(201,168,76,0.35);
            text-decoration: none;
            color: var(--cream);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .nav-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gold);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .nav-card:hover::before { opacity: 0.08; }
        .nav-card:hover {
            border-color: var(--gold);
            color: var(--cream);
            transform: translateY(-4px);
        }
        .nav-card .icon {
            font-size: 2rem;
            margin-bottom: 14px;
            display: block;
            position: relative;
        }
        .nav-card .label {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            display: block;
            position: relative;
        }
        .nav-card .sublabel {
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            color: var(--gold);
            text-transform: uppercase;
            margin-top: 6px;
            display: block;
            position: relative;
        }
        footer {
            margin-top: 80px;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="hero">
        <p class="logo-line">Est. 2024 &nbsp;·&nbsp; Cairo, Egypt</p>
        <h1>La <em>Maison</em></h1>
        <p class="tagline">Fine dining, simply done.</p>
        <div class="divider"></div>
        <div class="nav-cards">
            <a href="/menu" class="nav-card">
                <span class="icon">🍽️</span>
                <span class="label">Our Menu</span>
                <span class="sublabel">View dishes</span>
            </a>
            <a href="/reservation" class="nav-card">
                <span class="icon">📅</span>
                <span class="label">Reserve</span>
                <span class="sublabel">Book a table</span>
            </a>
            <a href="/order" class="nav-card">
                <span class="icon">🛵</span>
                <span class="label">Order Online</span>
                <span class="sublabel">Delivery</span>
                
            </a>
        </div>
        <footer>© 2024 La Maison · All rights reserved</footer>
    </div>
</body>
</html>
