<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Order Online – La Maison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
    <style>
        :root { --gold: #c9a84c; --dark: #1a1a1a; --cream: #faf7f2; }
        body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--dark); }
        .top-bar { background: var(--dark); padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; }
        .brand { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 1.4rem; }
        .brand em { color: var(--gold); font-style: italic; }
        .back-link { color: var(--gold); text-decoration: none; font-size: 0.85rem; letter-spacing: 0.1em; }
        .back-link:hover { color: #fff; }
        .page-header { text-align: center; padding: 60px 20px 30px; }
        .eyebrow { font-size: 0.8rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 400; }
        .gold-line { width: 50px; height: 2px; background: var(--gold); margin: 20px auto 0; }
        .order-wrap { max-width: 680px; margin: 50px auto 80px; padding: 0 24px; }
        label { display: block; font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: #888; margin-bottom: 6px; margin-top: 22px; }
        input[type="text"] {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            background: transparent;
            padding: 10px 0;
            font-size: 1rem;
            font-family: 'Lato', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-bottom-color: var(--gold); }
        .field-error { color: #c0392b; font-size: 0.8rem; margin-top: 4px; }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin: 40px 0 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0d8cc;
        }
        .menu-item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #f0ebe0;
            gap: 16px;
        }
        .item-info { flex: 1; }
        .item-info .name { font-size: 0.95rem; font-weight: 400; }
        .item-info .price { font-size: 0.82rem; color: var(--gold); margin-top: 2px; }
        .qty-input {
            width: 70px;
            border: 1px solid #ccc;
            padding: 6px 10px;
            text-align: center;
            font-size: 0.95rem;
            font-family: 'Lato', sans-serif;
            outline: none;
        }
        .qty-input:focus { border-color: var(--gold); }
        .subtotal { font-size: 0.88rem; color: #666; min-width: 80px; text-align: right; }
        .total-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
            padding: 20px 0;
            border-top: 2px solid var(--dark);
        }
        .total-label { font-size: 0.8rem; letter-spacing: 0.25em; text-transform: uppercase; }
        .total-amount { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); }
        .btn-submit {
            width: 100%;
            margin-top: 30px;
            padding: 16px;
            background: var(--dark);
            color: var(--cream);
            border: none;
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #333; }
        .alert-error { background: #fff5f5; border-left: 3px solid #c0392b; padding: 14px 18px; margin-bottom: 24px; color: #c0392b; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="brand">La <em>Maison</em></span>
        <a href="/" class="back-link">← Back to Home</a>
    </div>
    <div class="page-header">
        <p class="eyebrow">Delivery</p>
        <h1>Order Online</h1>
        <div class="gold-line"></div>
    </div>
    <div class="order-wrap">
        <div th:if="${errorMessage}" class="alert-error" th:text="${errorMessage}"></div>

        <form th:action="@{/order}" th:object="${order}" method="post" id="orderForm">

            <div class="section-title">Your Details</div>

            <label>Full Name</label>
            <input type="text" th:field="*{customerName}" placeholder="Your name" required/>
            <div class="field-error" th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}"></div>

            <label>Phone Number</label>
            <input type="text" th:field="*{phone}" placeholder="+20 1XX XXX XXXX" required/>
            <div class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>

            <label>Delivery Address</label>
            <input type="text" th:field="*{address}" placeholder="Street, building, apartment" required/>
            <div class="field-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>

            <div class="section-title">Select Items</div>

            <div th:each="item : ${menuItems}" class="menu-item-row">
                <div class="item-info">
                    <div class="name" th:text="${item.name}"></div>
                    <div class="price" th:text="${#numbers.formatDecimal(item.price,1,2)} + ' EGP'"></div>
                </div>
                <input type="number"
                       class="qty-input"
                       th:name="'qty_' + ${item.id}"
                       th:data-price="${item.price}"
                       value="0" min="0" max="20"
                       oninput="updateTotal()"/>
                <div class="subtotal" id="'sub_' + ${item.id}">0.00 EGP</div>
            </div>

            <div class="total-bar">
                <span class="total-label">Total</span>
                <span class="total-amount" id="grandTotal">0.00 EGP</span>
            </div>

            <button type="submit" class="btn-submit">Place Order</button>
        </form>
    </div>

    <script>
        function updateTotal() {
            const rows = document.querySelectorAll('.menu-item-row');
            let grand = 0;
            rows.forEach(row => {
                const qtyInput = row.querySelector('.qty-input');
                const subtotalEl = row.querySelector('.subtotal');
                const price = parseFloat(qtyInput.dataset.price) || 0;
                const qty   = parseInt(qtyInput.value) || 0;
                const sub   = price * qty;
                grand += sub;
                subtotalEl.textContent = sub.toFixed(2) + ' EGP';
            });
            document.getElementById('grandTotal').textContent = grand.toFixed(2) + ' EGP';
        }
    </script>
</body>
</html>
