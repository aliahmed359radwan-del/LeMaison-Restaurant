<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Order Confirmed – La Maison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
    <style>
        :root { --gold: #c9a84c; --dark: #1a1a1a; --cream: #faf7f2; }
        body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--dark); }
        .top-bar { background: var(--dark); padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; }
        .brand { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 1.4rem; }
        .brand em { color: var(--gold); font-style: italic; }
        .back-link { color: var(--gold); text-decoration: none; font-size: 0.85rem; letter-spacing: 0.1em; }
        .back-link:hover { color: #fff; }
        .confirm-wrap { max-width: 600px; margin: 70px auto 80px; padding: 0 24px; text-align: center; }
        .check-icon { font-size: 3.5rem; margin-bottom: 20px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 400; margin-bottom: 14px; }
        .thank-msg {
            font-size: 1rem;
            color: #555;
            line-height: 1.7;
            margin-bottom: 50px;
        }
        .order-card {
            border: 1px solid #e0d8cc;
            text-align: left;
            padding: 30px;
            margin-bottom: 30px;
        }
        .order-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0d8cc;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.92rem;
            border-bottom: 1px solid #f5f0e8;
        }
        .item-row:last-child { border-bottom: none; }
        .item-qty { color: #888; font-size: 0.82rem; }
        .item-sub { color: var(--gold); font-weight: 700; }
        .total-row {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 2px solid var(--dark);
            font-size: 1rem;
        }
        .total-row .amount {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
        }
        .btn-home {
            display: inline-block;
            margin-top: 10px;
            padding: 14px 40px;
            background: var(--dark);
            color: var(--cream);
            text-decoration: none;
            font-size: 0.82rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        .btn-home:hover { background: #333; color: var(--cream); }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="brand">La <em>Maison</em></span>
        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <div class="confirm-wrap">
        <div class="check-icon">✅</div>
        <h1>Order Confirmed!</h1>
        <p class="thank-msg">
            Thank you for ordering, <strong th:text="${confirmedOrder.customerName}">Name</strong>!<br/>
            Your food will be delivered to <strong th:text="${confirmedOrder.address}">Address</strong>.
        </p>

        <div class="order-card">
            <h3>Order Summary</h3>
            <div th:each="item : ${confirmedOrder.items}" class="item-row">
                <div>
                    <span th:text="${item.menuItemName}">Item</span>
                    <span class="item-qty" th:text="' × ' + ${item.quantity}"></span>
                </div>
                <div class="item-sub" th:text="${#numbers.formatDecimal(item.subtotal,1,2)} + ' EGP'"></div>
            </div>
            <div class="total-row">
                <span>Total</span>
                <span class="amount" th:text="${#numbers.formatDecimal(confirmedOrder.totalPrice,1,2)} + ' EGP'"></span>
            </div>
        </div>

        <a href="/" class="btn-home">Back to Home</a>
    </div>
</body>
</html>
