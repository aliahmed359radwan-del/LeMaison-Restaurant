<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reserve a Table – La Maison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
    <style>
        :root { --gold: #c9a84c; --dark: #1a1a1a; --cream: #faf7f2; }
        body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--dark); }
        .top-bar { background: var(--dark); padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; }
        .brand { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 1.4rem; }
        .brand em { color: var(--gold); font-style: italic; }
        .back-link { color: var(--gold); text-decoration: none; font-size: 0.85rem; letter-spacing: 0.1em; }
        .back-link:hover { color: #fff; }
        .page-header { text-align: center; padding: 60px 20px 30px; }
        .eyebrow { font-size: 0.8rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 400; }
        .gold-line { width: 50px; height: 2px; background: var(--gold); margin: 20px auto 0; }
        .form-wrap { max-width: 560px; margin: 50px auto 80px; padding: 0 24px; }
        .seats-banner {
            background: var(--dark);
            color: var(--cream);
            padding: 18px 24px;
            margin-bottom: 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .seats-banner .label { font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: #aaa; }
        .seats-banner .count { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); }
        .date-check-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .date-check-form input[type="date"] {
            border: 1px solid #ccc;
            padding: 8px 12px;
            font-family: 'Lato', sans-serif;
            font-size: 0.9rem;
            flex: 1;
            min-width: 160px;
        }
        .btn-check {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 18px;
            font-size: 0.82rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-check:hover { background: var(--gold); color: var(--dark); }
        label { display: block; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: #888; margin-bottom: 6px; margin-top: 22px; }
        input[type="text"], input[type="date"], input[type="number"] {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            background: transparent;
            padding: 10px 0;
            font-size: 1rem;
            font-family: 'Lato', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-bottom-color: var(--gold); }
        .field-error { color: #c0392b; font-size: 0.8rem; margin-top: 4px; }
        .btn-submit {
            width: 100%;
            margin-top: 36px;
            padding: 16px;
            background: var(--dark);
            color: var(--cream);
            border: none;
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #333; }
        .alert-success { background: #f0f9f0; border-left: 3px solid #27ae60; padding: 14px 18px; margin-bottom: 24px; color: #1e7e34; }
        .alert-error   { background: #fff5f5; border-left: 3px solid #c0392b; padding: 14px 18px; margin-bottom: 24px; color: #c0392b; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="brand">La <em>Maison</em></span>
        <a href="/" class="back-link">← Back to Home</a>
    </div>
    <div class="page-header">
        <p class="eyebrow">Dining Experience</p>
        <h1>Reserve a Table</h1>
        <div class="gold-line"></div>
    </div>
    <div class="form-wrap">

        <!-- Seat availability check -->
        <div class="seats-banner">
            <div>
                <div class="label">Available seats</div>
                <div class="count" th:text="${availableSeats}">50</div>
                <div style="font-size:0.78rem;color:#aaa;" th:text="'on ' + ${checkDate}"></div>
            </div>
            <form method="get" action="/reservation" class="date-check-form">
                <input type="date" name="checkDate"
                       th:value="${checkDate}"
                       th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
                <button type="submit" class="btn-check">Check Date</button>
            </form>
        </div>

        <!-- Messages -->
        <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}"   class="alert-error"   th:text="${errorMessage}"></div>

        <!-- Reservation Form -->
        <form th:action="@{/reservation}" th:object="${reservation}" method="post">
            <label>Full Name</label>
            <input type="text" th:field="*{customerName}" placeholder="Your name" required/>
            <div class="field-error" th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}"></div>

            <label>Phone Number</label>
            <input type="text" th:field="*{phone}" placeholder="+20 1XX XXX XXXX" required/>
            <div class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>

            <label>Reservation Date</label>
            <input type="date" th:field="*{reservationDate}"
                   th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required/>
            <div class="field-error" th:if="${#fields.hasErrors('reservationDate')}" th:errors="*{reservationDate}"></div>

            <label>Number of Seats</label>
            <input type="number" th:field="*{seats}" min="1" max="50" placeholder="e.g. 2" required/>
            <div class="field-error" th:if="${#fields.hasErrors('seats')}" th:errors="*{seats}"></div>

            <button type="submit" class="btn-submit">Confirm Reservation</button><!-- s -->
        </form>
    </div>
</body>
</html>
